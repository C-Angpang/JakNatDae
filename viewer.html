<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작낳대 - 순위 & 대전 기록</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="image.png" alt="작낳대 로고">
        </div>
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="rankings">순위 확인</button>
            <button class="tab-btn" data-tab="matches">대전 기록</button>
        </nav>
    </header>

    <main>
        <!-- 순위 확인 탭 -->
        <section id="rankings" class="tab-content active">
            <h2>순위 확인</h2>
            <div class="ranking-section">
                <h3>팀 순위</h3>
                <div class="table-wrap">
                    <table id="team-ranking-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>팀</th>
                                <th>승점</th>
                                <th>1</th>
                                <th>2</th>
                                <th>3</th>
                                <th>4</th>
                                <th>MVP</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="ranking-section">
                <h3>개인 순위</h3>
                <div class="table-wrap">
                    <table id="player-ranking-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>이름</th>
                                <th>승점</th>
                                <th>1</th>
                                <th>2</th>
                                <th>3</th>
                                <th>4</th>
                                <th>승률</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 대전 기록 탭 -->
        <section id="matches" class="tab-content">
            <h2>대전 기록</h2>
            <div id="match-history"></div>
        </section>
    </main>

    <script src="js/firebase-config.js"></script>
    <script>
        // 팀 데이터 가져오기
        async function getTeamsData() {
            await dbReady;
            const snapshot = await db.ref('tournament/teams').once('value');
            return snapshot.val();
        }

        // === 순위 로직 ===
        const TEAM_COLOR_CLASS = {
            red: 'row-red', blue: 'row-blue', yellow: 'row-yellow', green: 'row-green'
        };
        const TEAM_BG_CLASS = {
            red: 'bg-red', blue: 'bg-blue', yellow: 'bg-yellow', green: 'bg-green'
        };

        async function loadRankings() {
            try {
                await dbReady;
                const [teamsSnap, matchesSnap] = await Promise.all([
                    db.ref('tournament/teams').once('value'),
                    db.ref('tournament/matches').once('value')
                ]);

                const teams = teamsSnap.val();
                const matches = matchesSnap.val();
                if (!teams) return;

                const playerStats = {};
                for (const [teamId, team] of Object.entries(teams)) {
                    (team.players || []).forEach(player => {
                        playerStats[player] = {
                            name: player, teamId, teamName: team.name, color: team.color,
                            totalPoints: 0, ranks: { 1: 0, 2: 0, 3: 0, 4: 0 }, games: 0
                        };
                    });
                }

                if (matches) {
                    for (const match of Object.values(matches)) {
                        for (const result of match.results) {
                            const key = result.player;
                            if (!playerStats[key]) {
                                const teamName = teams[result.team] ? teams[result.team].name : result.team;
                                const color = teams[result.team] ? teams[result.team].color : '';
                                playerStats[key] = {
                                    name: result.player, teamId: result.team, teamName, color,
                                    totalPoints: 0, ranks: { 1: 0, 2: 0, 3: 0, 4: 0 }, games: 0
                                };
                            }
                            playerStats[key].totalPoints += result.totalPoints;
                            playerStats[key].games += 1;
                            if (result.rank >= 1 && result.rank <= 4) {
                                playerStats[key].ranks[result.rank] += 1;
                            }
                        }
                    }
                }

                // 팀 순위
                const teamAgg = {};
                for (const [teamId, team] of Object.entries(teams)) {
                    teamAgg[teamId] = {
                        name: team.name, color: team.color,
                        totalPoints: team.bonusPoints || 0,
                        ranks: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        mvp: '-', mvpPoints: -Infinity
                    };
                }
                for (const ps of Object.values(playerStats)) {
                    if (!teamAgg[ps.teamId]) continue;
                    teamAgg[ps.teamId].totalPoints += ps.totalPoints;
                    for (let r = 1; r <= 4; r++) teamAgg[ps.teamId].ranks[r] += ps.ranks[r];
                    if (ps.totalPoints > teamAgg[ps.teamId].mvpPoints && ps.games > 0) {
                        teamAgg[ps.teamId].mvpPoints = ps.totalPoints;
                        teamAgg[ps.teamId].mvp = ps.name;
                    }
                }

                const sortedTeams = Object.values(teamAgg).sort((a, b) => b.totalPoints - a.totalPoints);
                document.querySelector('#team-ranking-table tbody').innerHTML = sortedTeams.map((team, i) => {
                    const scoreClass = team.totalPoints >= 0 ? 'score-positive' : 'score-negative';
                    const rowClass = TEAM_COLOR_CLASS[team.color] || '';
                    const bgClass = TEAM_BG_CLASS[team.color] || '';
                    return `<tr class="${rowClass}">
                        <td>${i + 1}</td>
                        <td class="${bgClass}">${team.name}</td>
                        <td class="${scoreClass}">${team.totalPoints}</td>
                        <td>${team.ranks[1]}</td><td>${team.ranks[2]}</td>
                        <td>${team.ranks[3]}</td><td>${team.ranks[4]}</td>
                        <td>${team.mvp}</td>
                    </tr>`;
                }).join('');

                // 개인 순위
                const sortedPlayers = Object.values(playerStats).filter(p => p.games > 0)
                    .sort((a, b) => b.totalPoints - a.totalPoints);
                const playerBody = document.querySelector('#player-ranking-table tbody');
                if (sortedPlayers.length === 0) {
                    playerBody.innerHTML = '<tr><td colspan="8" style="color:#888">매치 기록 없음</td></tr>';
                } else {
                    playerBody.innerHTML = sortedPlayers.map((player, i) => {
                        const scoreClass = player.totalPoints >= 0 ? 'score-positive' : 'score-negative';
                        const playerBg = TEAM_BG_CLASS[player.color] || '';
                        const topCount = player.ranks[1] + player.ranks[2];
                        const winRate = player.games > 0 ? ((topCount / player.games) * 100).toFixed(2) : '0.00';
                        return `<tr>
                            <td>${i + 1}</td>
                            <td class="${playerBg}">${player.name}</td>
                            <td class="${scoreClass}">${player.totalPoints}</td>
                            <td>${player.ranks[1]}</td><td>${player.ranks[2]}</td>
                            <td>${player.ranks[3]}</td><td>${player.ranks[4]}</td>
                            <td>${winRate}%</td>
                        </tr>`;
                    }).join('');
                }
            } catch (e) {
                console.error('순위 로드 실패:', e);
            }
        }

        // === 대전 기록 로직 (읽기 전용 - 수정/삭제 없음) ===
        async function loadMatchHistory() {
            const container = document.getElementById('match-history');
            const teams = await getTeamsData();

            const playerColorMap = {};
            if (teams) {
                for (const [teamId, team] of Object.entries(teams)) {
                    const bgClass = { red: 'bg-red', blue: 'bg-blue', yellow: 'bg-yellow', green: 'bg-green' }[team.color] || '';
                    (team.players || []).forEach(p => { playerColorMap[p] = bgClass; });
                }
            }

            try {
                await dbReady;
                const snapshot = await db.ref('tournament/matches').once('value');
                const matches = snapshot.val();

                if (!matches) {
                    container.innerHTML = '<p class="no-records">기록 없음</p>';
                    return;
                }

                const entries = Object.entries(matches).sort((a, b) => b[1].timestamp - a[1].timestamp);

                container.innerHTML = entries.map(([key, match], idx) => {
                    const sortedResults = [...match.results].sort((a, b) => b.rawScore - a.rawScore);

                    const cardsHTML = sortedResults.map(r => {
                        const scoreClass = r.rawScore >= 25000 ? 'score-positive' : 'score-negative';
                        const pointsClass = r.totalPoints >= 0 ? 'score-positive' : 'score-negative';
                        const cardBg = playerColorMap[r.player] || '';
                        return `
                            <div class="match-player-card ${cardBg}">
                                <div class="player-name-text">${r.player} (${r.wind})</div>
                                <div class="player-score-text ${scoreClass}">${r.rawScore.toLocaleString()}</div>
                                <div class="player-points-text ${pointsClass}">${r.totalPoints >= 0 ? '+' : ''}${r.totalPoints}pt</div>
                            </div>
                        `;
                    }).join('');

                    const matchNum = entries.length - idx;

                    return `
                        <div class="match-record">
                            <div class="match-record-header">
                                <span>제 ${matchNum}국</span>
                            </div>
                            <div class="match-record-results">${cardsHTML}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<p style="color:#ef5350;">로드 실패</p>';
                console.error('대전 기록 로드 실패:', e);
            }
        }

        // === 탭 네비게이션 ===
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');

                if (btn.dataset.tab === 'rankings') loadRankings();
                else if (btn.dataset.tab === 'matches') loadMatchHistory();
            });
        });

        // 페이지 로드 시 순위 자동 로드
        dbReady.then(() => loadRankings());
    </script>
</body>
</html>
